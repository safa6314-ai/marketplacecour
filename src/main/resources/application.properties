# Gmail SMTP configuration for Forgot Password.
# Do not use your normal Gmail password. Use a Gmail App Password.
SMTP_HOST=smtp.gmail.com
SMTP_PORT=587
SMTP_USERNAME=bilel3375@gmail.com
SMTP_FROM=bilel3375@gmail.com
SMTP_PASSWORD=
ADMIN_SECURITY_EMAIL=bilel3375@gmail.com

# Twilio Verify API configuration.
# Keep these values empty here if you prefer IntelliJ environment variables or .env.
# Use true only for local development. The test SMS code will be 000000.
TWILIO_VERIFY_DISABLED=true
TWILIO_ACCOUNT_SID=
TWILIO_AUTH_TOKEN=
TWILIO_VERIFY_SERVICE_SID=

# OAuth social login configuration.
# Redirect URIs to add in Google/Facebook console:
# http://localhost:8765/oauth/google
# http://localhost:8765/oauth/facebook
GOOGLE_CLIENT_ID=
GOOGLE_CLIENT_SECRET=
FACEBOOK_CLIENT_ID=
FACEBOOK_CLIENT_SECRET=
FACEBOOK_API_VERSION=v20.0

# Stripe Marketplace configuration.
# Use a secret test key that starts with sk_test_, never pk_test_.
STRIPE_SECRET_KEY=
STRIPE_CURRENCY=usd
STRIPE_SUCCESS_URL=https://example.com/artevia/stripe/success
STRIPE_CANCEL_URL=https://example.com/artevia/stripe/cancel
